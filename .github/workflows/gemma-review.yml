name: Gemma Review

on:
  workflow_call:
    inputs:
      model:
        type: string
        default: gemma3:1b
      language:
        type: string
        default: ko
      max-inline-comments:
        type: number
        default: 20
      min-confidence:
        type: string
        default: '0.6'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

concurrency:
  group: gemma-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GEMMA_REVIEW_MODEL: ${{ inputs.model || 'gemma3:1b' }}
  GEMMA_REVIEW_OLLAMA_VERSION: 0.12.10
  GEMMA_REVIEW_OLLAMA_LINUX_AMD64_SHA256: 8f4bf70a9856a34ba71355745c2189a472e2691a020ebd2e242a58e4d2094722
  GEMMA_REVIEW_CACHE_VERSION: v2
  GEMMA_REVIEW_MAX_DIFF_BYTES: 200000
  GEMMA_REVIEW_MAX_FILE_BYTES: 60000
  GEMMA_REVIEW_MAX_CHUNK_BYTES: 24000
  GEMMA_REVIEW_DIFF_CONTEXT_LINES: 3
  GEMMA_REVIEW_MAX_INLINE_COMMENTS: ${{ inputs['max-inline-comments'] || 20 }}
  GEMMA_REVIEW_MIN_CONFIDENCE: ${{ inputs['min-confidence'] || '0.6' }}
  GEMMA_REVIEW_DETERMINISTIC_RULES: true
  GEMMA_REVIEW_TIMEOUT_MS: 600000
  GEMMA_REVIEW_FAIL_ON_SEVERITY: critical,high
  GEMMA_REVIEW_LANGUAGE: ${{ inputs.language || 'ko' }}

jobs:
  prepare:
    name: Prepare diff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout trusted reviewer code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare PR diff
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/gemma-review/prepare-diff.mjs --output review-input.json

      - name: Upload review input
        uses: actions/upload-artifact@v4
        with:
          name: gemma-review-input
          path: review-input.json
          retention-days: 3

  review:
    name: Review with Gemma
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout trusted reviewer code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download review input
        uses: actions/download-artifact@v4
        with:
          name: gemma-review-input

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: gemma-review-${{ runner.os }}-${{ env.GEMMA_REVIEW_CACHE_VERSION }}-${{ env.GEMMA_REVIEW_MODEL }}
          restore-keys: |
            gemma-review-${{ runner.os }}-${{ env.GEMMA_REVIEW_CACHE_VERSION }}-

      - name: Cache Ollama runtime
        uses: actions/cache@v4
        with:
          path: ~/.cache/gemma-review/ollama-downloads
          key: gemma-review-ollama-${{ runner.os }}-${{ env.GEMMA_REVIEW_CACHE_VERSION }}-${{ env.GEMMA_REVIEW_OLLAMA_VERSION }}

      - name: Install pinned Ollama
        run: |
          set -euo pipefail
          OLLAMA_DOWNLOAD_DIR="$HOME/.cache/gemma-review/ollama-downloads/${GEMMA_REVIEW_OLLAMA_VERSION}"
          OLLAMA_ARCHIVE="$OLLAMA_DOWNLOAD_DIR/ollama-linux-amd64.tgz"
          mkdir -p "$OLLAMA_DOWNLOAD_DIR"
          if [ ! -f "$OLLAMA_ARCHIVE" ]; then
            curl -fsSL "https://github.com/ollama/ollama/releases/download/v${GEMMA_REVIEW_OLLAMA_VERSION}/ollama-linux-amd64.tgz" -o "$OLLAMA_ARCHIVE"
          fi
          printf '%s  %s\n' "$GEMMA_REVIEW_OLLAMA_LINUX_AMD64_SHA256" "$OLLAMA_ARCHIVE" | sha256sum -c -
          OLLAMA_INSTALL_DIR="$RUNNER_TEMP/ollama-verified"
          mkdir -p "$OLLAMA_INSTALL_DIR"
          tar --no-same-owner --no-same-permissions -xzf "$OLLAMA_ARCHIVE" -C "$OLLAMA_INSTALL_DIR"
          test -x "$OLLAMA_INSTALL_DIR/bin/ollama"
          echo "$OLLAMA_INSTALL_DIR/bin" >> "$GITHUB_PATH"

      - name: Pull and serve model
        run: |
          set -euo pipefail
          ollama serve > "$RUNNER_TEMP/ollama.log" 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null; then
              break
            fi
            sleep 1
          done
          ollama pull "$GEMMA_REVIEW_MODEL"

      - name: Review chunks
        run: node scripts/gemma-review/review.mjs --input review-input.json --output review-output.json

      - name: Upload review output
        uses: actions/upload-artifact@v4
        with:
          name: gemma-review-output
          path: review-output.json
          retention-days: 3

  publish:
    name: Publish review
    needs: [prepare, review]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout trusted reviewer code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download review input
        uses: actions/download-artifact@v4
        with:
          name: gemma-review-input

      - name: Download review output
        uses: actions/download-artifact@v4
        with:
          name: gemma-review-output

      - name: Publish comments
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/gemma-review/publish-comments.mjs --review-input review-input.json --input review-output.json
